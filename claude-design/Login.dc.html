<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4f5f8;--panel:#ffffff;--panel2:#f7f8fa;--line:#e3e6ee;--line-soft:#edeff5;--text:#141b29;--text2:#47505f;--text3:#6e7890;--amber:#b47708;--amber-btn:#f0b429;--amber-dim:rgba(201,138,10,.10);--sky:#1a73c7;--sky-dim:rgba(26,115,199,.10);--red:#cc3a33;--red-dim:rgba(204,58,51,.08);--green:#1f8f60;--green-dim:rgba(31,143,96,.10);--shadow:0 8px 28px rgba(20,30,50,.10);--mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Inter',system-ui,sans-serif}
    body.dark{--bg:#0b0d11;--panel:#12151b;--panel2:#171b22;--line:#232833;--line-soft:#1c212b;--text:#f1f3f6;--text2:#b8c0cc;--text3:#8d96a6;--amber:#f0b429;--amber-dim:rgba(240,180,41,.12);--sky:#5cb3ff;--sky-dim:rgba(92,179,255,.12);--red:#e5534b;--red-dim:rgba(229,83,75,.12);--green:#3fb27f;--green-dim:rgba(63,178,127,.12);--shadow:0 8px 28px rgba(0,0,0,.45)}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{background:var(--bg);color:var(--text);font:400 14px/1.45 var(--sans);-webkit-font-smoothing:antialiased}
    a{color:var(--sky);text-decoration:none}
    a:hover{text-decoration:underline}
    input::placeholder{color:var(--text3)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  </style>
</helmet>
<div data-screen-label="Login" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:26px">
  <div style="display:flex;align-items:center;gap:10px;animation:fadeUp .5s ease both">
    <span style="width:30px;height:30px;border-radius:8px;background:#f0b429;color:#141414;display:grid;place-items:center;font:700 14px var(--mono)">L</span>
    <span style="font:600 16px var(--mono);letter-spacing:.02em">LightMove</span>
  </div>

  <div style="width:400px;max-width:94vw;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:32px;animation:fadeUp .5s .06s ease both">
    <div style="font:600 19px/1.25 var(--sans);margin:0 0 4px">Sign in</div>
    <div style="font:400 12px var(--mono);color:var(--text3);margin:0 0 24px">Executive search workspace</div>

    <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Work email</label>
    <input type="email" placeholder="you@firm.com" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none;margin-bottom:16px" style-focus="border-color:var(--sky)">

    <div style="display:flex;align-items:baseline;justify-content:space-between;margin:0 0 6px">
      <label style="font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3)">Password</label>
      <button onClick="{{ forgot }}" style="background:none;border:none;padding:0;cursor:pointer;font:500 11.5px var(--sans);color:var(--sky)" style-hover="text-decoration:underline">Forgot?</button>
    </div>
    <input type="password" placeholder="••••••••" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none;margin-bottom:20px" style-focus="border-color:var(--sky)">

    <button onClick="{{ signIn }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--amber-btn);border:1px solid var(--amber-btn);color:#141414;font:600 13.5px var(--sans);padding:10px 14px;border-radius:8px;cursor:pointer" style-hover="filter:brightness(1.05)">Continue</button>

    <sc-if value="{{ showSso }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;align-items:center;gap:10px;color:var(--text3);font:500 10px var(--mono);letter-spacing:.1em;text-transform:uppercase;margin:18px 0">
        <span style="flex:1;height:1px;background:var(--line-soft)"></span>
        <span>or</span>
        <span style="flex:1;height:1px;background:var(--line-soft)"></span>
      </div>
      <button onClick="{{ signIn }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--panel);border:1px solid var(--line);color:var(--text2);font:500 13px var(--sans);padding:10px 14px;border-radius:8px;cursor:pointer" style-hover="color:var(--text);border-color:var(--text3)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        Continue with SSO
      </button>
    </sc-if>

    <div style="font:400 11px var(--mono);color:var(--text3);text-align:center;margin-top:18px">Demo — any credentials work</div>
  </div>

  <div style="font:400 12.5px var(--sans);color:var(--text2);animation:fadeUp .5s .12s ease both">New to LightMove? <a href="Signup.dc.html">Create an account</a></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:720},&quot;showSso&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Options&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      showSso: this.props.showSso ?? true,
      signIn: () => { window.location.href = 'Workspace.dc.html'; },
      forgot: () => { alert('Password reset flow — out of mockup scope'); },
    };
  }
}
</script>
</body>
</html>
