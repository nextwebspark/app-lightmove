<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4f5f8;--panel:#ffffff;--panel2:#f7f8fa;--line:#e3e6ee;--line-soft:#edeff5;--text:#1b2230;--text2:#5a6474;--text3:#98a1b3;--amber:#b47708;--amber-btn:#f0b429;--amber-dim:rgba(201,138,10,.10);--sky:#1a73c7;--sky-dim:rgba(26,115,199,.10);--red:#cc3a33;--red-dim:rgba(204,58,51,.08);--green:#1f8f60;--green-dim:rgba(31,143,96,.10);--shadow:0 8px 28px rgba(20,30,50,.10);--mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Inter',system-ui,sans-serif}
    body.dark{--bg:#0b0d11;--panel:#12151b;--panel2:#171b22;--line:#232833;--line-soft:#1c212b;--text:#e8eaee;--text2:#9aa3b2;--text3:#5f6877;--amber:#f0b429;--amber-dim:rgba(240,180,41,.12);--sky:#5cb3ff;--sky-dim:rgba(92,179,255,.12);--red:#e5534b;--red-dim:rgba(229,83,75,.12);--green:#3fb27f;--green-dim:rgba(63,178,127,.12);--shadow:0 8px 28px rgba(0,0,0,.45)}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{background:var(--bg);color:var(--text);font:400 14px/1.45 var(--sans);-webkit-font-smoothing:antialiased}
    a{color:var(--sky);text-decoration:none}
    a:hover{text-decoration:underline}
    input::placeholder{color:var(--text3)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  </style>
</helmet>
<div data-screen-label="Signup" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:24px">
  <div style="display:flex;align-items:center;gap:10px;animation:fadeUp .5s ease both">
    <span style="width:30px;height:30px;border-radius:8px;background:#f0b429;color:#141414;display:grid;place-items:center;font:700 14px var(--mono)">L</span>
    <span style="font:600 16px var(--mono);letter-spacing:.02em">LightMove</span>
  </div>

  <div style="display:flex;align-items:center;gap:0;animation:fadeUp .5s .04s ease both">
    <sc-for list="{{ steps }}" as="s" hint-placeholder-count="3">
      <div style="display:flex;align-items:center">
        <sc-if value="{{ s.showConnector }}" hint-placeholder-val="{{ false }}">
          <span style="width:32px;height:1px;background:{{ s.connectorColor }};margin:0 8px"></span>
        </sc-if>
        <button onClick="{{ s.go }}" style="display:flex;align-items:center;gap:8px;background:none;border:none;padding:0;cursor:pointer">
          <span style="width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font:600 11px var(--mono);background:{{ s.circleBg }};color:{{ s.circleColor }};border:1px solid {{ s.circleBorder }}">{{ s.mark }}</span>
          <span style="font:500 12px var(--sans);color:{{ s.labelColor }}">{{ s.label }}</span>
        </button>
      </div>
    </sc-for>
  </div>

  <div style="width:480px;max-width:94vw;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:32px;animation:fadeUp .5s .08s ease both">
    <div style="font:600 19px/1.25 var(--sans);margin:0 0 4px">{{ title }}</div>
    <div style="font:400 12px var(--mono);color:var(--text3);margin:0 0 24px">{{ subtitle }}</div>

    <sc-if value="{{ isStep1 }}" hint-placeholder-val="{{ true }}">
      <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Full name</label>
      <input type="text" placeholder="Yara Haddad" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none;margin-bottom:16px" style-focus="border-color:var(--sky)">
      <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Work email</label>
      <input type="email" placeholder="you@firm.com" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none;margin-bottom:16px" style-focus="border-color:var(--sky)">
      <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Password</label>
      <input type="password" placeholder="8+ characters" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none;margin-bottom:6px" style-focus="border-color:var(--sky)">
      <div style="font:400 11px var(--mono);color:var(--text3);margin-bottom:20px">Use at least 8 characters, with one number.</div>
      <button onClick="{{ next }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--amber-btn);border:1px solid var(--amber-btn);color:#141414;font:600 13.5px var(--sans);padding:10px 14px;border-radius:8px;cursor:pointer" style-hover="filter:brightness(1.05)">Continue</button>
    </sc-if>

    <sc-if value="{{ isStep2 }}" hint-placeholder-val="{{ false }}">
      <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Organization name</label>
      <input type="text" placeholder="e.g. LightMove Search Partners" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none;margin-bottom:6px" style-focus="border-color:var(--sky)">
      <div style="font:400 11px var(--mono);color:var(--text3);margin-bottom:16px">This becomes your workspace name — you can change it later.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;margin-bottom:20px">
        <div>
          <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Company size</label>
          <select style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none" style-focus="border-color:var(--sky)">
            <option>1–10 people</option><option>11–50 people</option><option>51–200 people</option><option>200+ people</option>
          </select>
        </div>
        <div>
          <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Primary region</label>
          <select style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none" style-focus="border-color:var(--sky)">
            <option>GCC</option><option>MENA</option><option>Europe</option><option>North America</option><option>Global</option>
          </select>
        </div>
        <div>
          <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Your role</label>
          <select style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none" style-focus="border-color:var(--sky)">
            <option>Partner</option><option>Consultant</option><option>Researcher</option><option>Operations</option>
          </select>
        </div>
        <div>
          <label style="display:block;font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:0 0 6px">Team focus</label>
          <select style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none" style-focus="border-color:var(--sky)">
            <option>Executive search</option><option>Board advisory</option><option>Talent mapping</option><option>Mixed</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button onClick="{{ back }}" style="flex:none;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);color:var(--text2);font:500 13px var(--sans);padding:10px 16px;border-radius:8px;cursor:pointer" style-hover="color:var(--text);border-color:var(--text3)">Back</button>
        <button onClick="{{ next }}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--amber-btn);border:1px solid var(--amber-btn);color:#141414;font:600 13.5px var(--sans);padding:10px 14px;border-radius:8px;cursor:pointer" style-hover="filter:brightness(1.05)">Continue</button>
      </div>
    </sc-if>

    <sc-if value="{{ isStep3 }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
        <sc-for list="{{ invites }}" as="inv" hint-placeholder-count="2">
          <div style="display:flex;gap:8px;align-items:center">
            <input type="email" placeholder="colleague@firm.com" style="flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:400 13px var(--mono);color:var(--text);outline:none;min-width:0" style-focus="border-color:var(--sky)">
            <select style="flex:none;width:130px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 10px;font:400 12.5px var(--mono);color:var(--text);outline:none" style-focus="border-color:var(--sky)">
              <option>Member</option><option>Admin</option>
            </select>
            <button onClick="{{ removeInvite }}" data-idx="{{ $index }}" style="flex:none;background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:6px;font:400 13px var(--sans)" style-hover="color:var(--red)">✕</button>
          </div>
        </sc-for>
      </div>
      <button onClick="{{ addInvite }}" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:0;cursor:pointer;font:500 12.5px var(--sans);color:var(--sky);margin-bottom:22px" style-hover="text-decoration:underline">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"></path></svg>
        Add another
      </button>
      <div style="display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--sky-dim);border-radius:8px;color:var(--sky);font:400 11.5px var(--mono);margin-bottom:20px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex:none"><circle cx="12" cy="12" r="9"></circle><path d="M12 8h.01M12 11v5"></path></svg>
        Invitees get access to projects you add them to — roles apply per project.
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button onClick="{{ back }}" style="flex:none;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);color:var(--text2);font:500 13px var(--sans);padding:10px 16px;border-radius:8px;cursor:pointer" style-hover="color:var(--text);border-color:var(--text3)">Back</button>
        <button onClick="{{ finish }}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--amber-btn);border:1px solid var(--amber-btn);color:#141414;font:600 13.5px var(--sans);padding:10px 14px;border-radius:8px;cursor:pointer" style-hover="filter:brightness(1.05)">Send invites &amp; finish</button>
      </div>
      <button onClick="{{ finish }}" style="width:100%;background:none;border:none;padding:0;cursor:pointer;font:500 12.5px var(--sans);color:var(--text3);margin-top:16px;text-align:center" style-hover="color:var(--text2);text-decoration:underline">Skip for now</button>
    </sc-if>
  </div>

  <div style="font:400 12.5px var(--sans);color:var(--text2);animation:fadeUp .5s .12s ease both">Already have an account? <a href="Login.dc.html">Sign in</a></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760}}">
class Component extends DCLogic {
  state = { step: 1, invites: [{ id: 1 }, { id: 2 }] };

  renderVals() {
    const step = this.state.step;
    const meta = [
      { n: 1, label: 'Account' },
      { n: 2, label: 'Organization' },
      { n: 3, label: 'Invite team' },
    ];
    const steps = meta.map((s, i) => {
      const done = s.n < step, active = s.n === step;
      return {
        label: s.label,
        mark: done ? '✓' : String(s.n),
        showConnector: i > 0,
        connectorColor: s.n <= step ? 'var(--amber-btn)' : 'var(--line)',
        circleBg: done ? 'var(--green-dim)' : active ? 'var(--amber-btn)' : 'var(--panel2)',
        circleColor: done ? 'var(--green)' : active ? '#141414' : 'var(--text3)',
        circleBorder: done ? 'transparent' : active ? 'var(--amber-btn)' : 'var(--line)',
        labelColor: active ? 'var(--text)' : done ? 'var(--text2)' : 'var(--text3)',
        go: () => { if (s.n < step) this.setState({ step: s.n }); },
      };
    });
    const titles = {
      1: ['Create your account', 'Step 1 of 3 · your details'],
      2: ['About your organization', 'Step 2 of 3 · this becomes your workspace'],
      3: ['Invite your team', 'Step 3 of 3 · optional — invite people later from Team'],
    };
    return {
      steps,
      title: titles[step][0],
      subtitle: titles[step][1],
      isStep1: step === 1,
      isStep2: step === 2,
      isStep3: step === 3,
      invites: this.state.invites,
      next: () => this.setState({ step: Math.min(3, step + 1) }),
      back: () => this.setState({ step: Math.max(1, step - 1) }),
      addInvite: () => this.setState(s => ({ invites: [...s.invites, { id: Date.now() }] })),
      removeInvite: (e) => {
        const idx = +e.currentTarget.dataset.idx;
        this.setState(s => ({ invites: s.invites.filter((_, i) => i !== idx) }));
      },
      finish: () => { window.location.href = 'Workspace.dc.html?fresh=1'; },
    };
  }
}
</script>
</body>
</html>
